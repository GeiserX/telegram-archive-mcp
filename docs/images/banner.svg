<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2AABEE"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="150" y1="0" x2="150" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="450" y1="0" x2="450" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="750" y1="0" x2="750" y2="200"/>
  </g>

  <!-- Bridge/connector icon -->
  <g transform="translate(60, 60)">
    <!-- Left node (Telegram) -->
    <rect x="0" y="20" width="40" height="40" rx="6" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <text x="20" y="46" text-anchor="middle" font-family="monospace" font-size="12" fill="#ffffff" opacity="0.7">TG</text>

    <!-- Bridge line with JSON braces -->
    <line x1="44" y1="40" x2="76" y2="40" stroke="#ffffff" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="60" y="28" text-anchor="middle" font-family="monospace" font-size="14" fill="#ffffff" opacity="0.5">{}</text>

    <!-- Right node (MCP/LLM) -->
    <rect x="80" y="20" width="40" height="40" rx="6" fill="url(#glow)" stroke="#ffffff" stroke-width="2" opacity="0.9"/>
    <text x="100" y="46" text-anchor="middle" font-family="monospace" font-size="11" fill="#ffffff" opacity="0.7">MCP</text>

    <!-- Bidirectional arrows -->
    <polygon points="72,36 78,40 72,44" fill="#ffffff" opacity="0.6"/>
    <polygon points="48,36 42,40 48,44" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="210" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Telegram Archive MCP
  </text>

  <!-- Subtitle -->
  <text x="212" y="130" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.65" letter-spacing="0.3">
    MCP server bridging LLMs to Telegram chat history
  </text>

  <!-- Decorative: message timeline on right -->
  <g transform="translate(770, 40)" opacity="0.15">
    <line x1="10" y1="0" x2="10" y2="120" stroke="#ffffff" stroke-width="2"/>
    <circle cx="10" cy="10" r="5" fill="#ffffff"/>
    <rect x="22" y="4" width="50" height="12" rx="6" fill="#ffffff" opacity="0.7"/>
    <circle cx="10" cy="40" r="5" fill="#ffffff" opacity="0.8"/>
    <rect x="22" y="34" width="40" height="12" rx="6" fill="#ffffff" opacity="0.6"/>
    <circle cx="10" cy="70" r="5" fill="#ffffff" opacity="0.6"/>
    <rect x="22" y="64" width="55" height="12" rx="6" fill="#ffffff" opacity="0.5"/>
    <circle cx="10" cy="100" r="5" fill="#ffffff" opacity="0.4"/>
    <rect x="22" y="94" width="35" height="12" rx="6" fill="#ffffff" opacity="0.4"/>
  </g>
</svg>
